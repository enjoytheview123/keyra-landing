<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyra | Unlocking Wellness</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        body { font-family: 'Inter', system-ui, sans-serif; }
        .heading-font { font-family: 'Space Grotesk', sans-serif; }
        
        .hero-bg { background: linear-gradient(135deg, #ffffff 50%, #f0fdfa 100%); }
        
        .wellness-scene {
            border-radius: 2.75rem;
            overflow: hidden;
            box-shadow: 0 25px 60px -15px rgb(17 63 68 / 0.12);
        }
        
        /* Improved logo sizing */
        .nav-logo {
            height: 78px;           /* Good balanced size for most screens */
            width: auto;
            max-width: 100%;
            object-fit: contain;
        }
        
        /* Mobile specific - make logo a bit larger on small screens */
        @media (max-width: 768px) {
            .nav-logo {
                height: 68px;
            }
        }
        
        .vial-image {
            height: 140px;
            width: auto;
            object-fit: contain;
            margin: 0 auto 24px;
        }
    </style>
</head>
<body class="bg-white text-[#113F44]">

    <!-- NAVBAR - Better balanced on mobile -->
    <nav class="bg-white border-b border-[#113F44]/10 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-6 py-5">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <!-- Logo -->
                <div class="flex justify-center md:justify-start">
                    <img src="horizontal Logo.png" alt="Keyra" class="nav-logo">
                </div>
                
                <!-- Desktop menu + button -->
                <div class="flex items-center justify-between md:justify-end w-full md:w-auto gap-8">
                    <div class="hidden md:flex items-center gap-x-10 font-medium text-[#113F44]">
                        <a href="#how" class="hover:text-[#00E8D8]">How it Works</a>
                        <a href="#peptides" class="hover:text-[#00E8D8]">Peptides</a>
                        <a href="#difference" class="hover:text-[#00E8D8]">Why Keyra</a>
                    </div>
                    
                    <button onclick="openQuizModal()" 
                            class="px-8 py-4 bg-[#00E8D8] hover:bg-[#00D9C8] text-[#113F44] font-semibold rounded-3xl shadow-lg shadow-[#00E8D8]/30 flex items-center gap-x-3 text-base whitespace-nowrap">
                        Take the Quiz <span class="text-xl">→</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- HERO - Main graphic slightly more centered -->
    <header class="hero-bg pt-12 pb-20 md:pb-28">
        <div class="max-w-screen-2xl mx-auto px-8">
            <div class="grid md:grid-cols-12 gap-12 items-center">
                <!-- Left: Text -->
                <div class="md:col-span-5">
                    <div class="inline-flex items-center gap-2 bg-white px-5 py-2 rounded-3xl border border-[#00E8D8]/30 text-sm font-medium mb-8">
                        <div class="w-2 h-2 bg-[#00E8D8] rounded-full animate-pulse"></div>
                        Clinician-reviewed • Delivered to your door
                    </div>
                    
                    <h1 class="heading-font text-6xl md:text-7xl leading-[1.05] font-medium tracking-tighter">
                        Wellness,<br>delivered.
                    </h1>
                    
                    <p class="mt-6 text-2xl text-[#113F44]/80">
                        Quick. Private. Simple.<br>
                        Clinician-coordinated peptide support delivered to your door.
                    </p>
                    
                    <div class="flex flex-wrap gap-4 mt-12">
                        <button onclick="openQuizModal()" 
                                class="px-12 py-7 bg-[#00E8D8] hover:bg-[#00D9C8] text-[#113F44] font-semibold text-2xl rounded-3xl shadow-xl shadow-[#00E8D8]/30 flex items-center gap-x-4">
                            Am I a good fit?
                            <span class="text-4xl">→</span>
                        </button>
                        
                        <a href="#peptides" 
                           class="px-10 py-7 border-2 border-[#113F44] hover:bg-[#113F44] hover:text-white font-medium rounded-3xl text-xl flex items-center">
                            Explore peptides
                        </a>
                    </div>
                </div>
                
                <!-- Right: Wellness Image -->
                <div class="md:col-span-7 relative flex justify-center md:justify-end">
                    <div class="wellness-scene max-w-[640px]">
                        <img src="wellness5.jpg" 
                             alt="Woman smiling in kitchen with blender and green smoothie"
                             class="w-full h-auto">
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- The rest of your sections (ticker, How It Works, Peptides, CTA) remain the same as the previous version with your vial images. -->

    <script>
        function openQuizModal() {
            document.getElementById('quiz-modal').classList.remove('hidden');
            document.getElementById('quiz-modal').style.display = 'flex';
        }
        
        function closeQuizModal() {
            const modal = document.getElementById('quiz-modal');
            modal.style.display = 'none';
            modal.classList.add('hidden');
        }
        
        function fakeSubmit() {
            alert("✅ Thank you! Your interest has been recorded.\n\nWe will reach out shortly with next steps.");
            closeQuizModal();
        }
    </script>
</body>
</html>
