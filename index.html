<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keyra — Unlocking Wellness</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #ffffff;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .logo-container {
      position: relative;
      display: inline-block;
    }

    .logo {
      width: 460px;
      max-width: 92vw;
      display: block;
      margin: 0 auto;
      background: transparent;
    }

    /* Glow starts at bottom of Y, moves slowly upward, ends in burst at top */
    .flow-glow {
      position: absolute;
      top: 62%;
      left: 52%;
      width: 29%;
      height: 72%;
      background: linear-gradient(
        180deg,
        transparent 0%,
        rgba(103, 232, 249, 0.9) 25%,
        rgba(103, 232, 249, 0.95) 55%,
        rgba(103, 232, 249, 1) 78%,
        transparent 100%
      );
      opacity: 0;
      border-radius: 50%;
      animation: flowUpY 20s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      pointer-events: none;
      mix-blend-mode: screen;
      filter: blur(9px);
    }

    @keyframes flowUpY {
      0%   { opacity: 0; transform: translateY(75px) scale(0.75); }
      22%  { opacity: 0.9; transform: translateY(20px) scale(1.02); }
      48%  { opacity: 0.95; transform: translateY(-32px) scale(1.08); }
      72%  { opacity: 1; transform: translateY(-68px) scale(1.15); }   /* burst at top */
      88%  { opacity: 0.6; transform: translateY(-95px) scale(0.95); }
      100% { opacity: 0; transform: translateY(-125px) scale(0.7); }
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <img src="logo.png" alt="Keyra" class="logo">
    <div class="flow-glow"></div>
  </div>
</body>
</html>
